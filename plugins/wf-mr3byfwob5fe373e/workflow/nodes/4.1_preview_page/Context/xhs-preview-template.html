<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小红书笔记预览模板</title>
  <style>
    :root {
      color-scheme: light;
      --page-bg: #f6f6f2;
      --phone-bg: #fffefa;
      --ink: #242424;
      --muted: #77736a;
      --line: #e6e0d6;
      --brand: #ff2442;
      --brand-dark: #d91f38;
      --chip: #fff0f2;
      --shadow: 0 18px 50px rgba(30, 24, 18, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page-bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .stage {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 16px;
    }

    .phone {
      width: min(100%, 430px);
      background: var(--phone-bg);
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .topbar {
      height: 52px;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      padding: 0 12px;
      border-bottom: 1px solid var(--line);
    }

    .icon-button {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: var(--ink);
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .account {
      min-width: 0;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .carousel {
      position: relative;
      background: #ebe7dd;
    }

    .slides {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
    }

    .slides::-webkit-scrollbar {
      display: none;
    }

    .slide {
      min-width: 100%;
      aspect-ratio: 3 / 4;
      scroll-snap-align: start;
      background: #f0ece3;
    }

    .slide img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .pager {
      position: absolute;
      right: 12px;
      top: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.56);
      color: #fff;
      font-size: 12px;
      line-height: 1;
    }

    .content {
      padding: 18px 18px 20px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 20px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .body-copy {
      margin: 0;
      color: #34312c;
      font-size: 15px;
      line-height: 1.78;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .tag {
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--chip);
      color: var(--brand-dark);
      font-size: 13px;
      line-height: 1;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 14px 18px 18px;
      border-top: 1px solid var(--line);
    }

    .action {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--ink);
      padding: 10px 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    .copy {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
      font-weight: 700;
    }

    .toast {
      min-height: 20px;
      margin: 0 18px 18px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 380px) {
      .stage {
        padding: 0;
      }

      .phone {
        min-height: 100vh;
        border-radius: 0;
        border-left: 0;
        border-right: 0;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <article class="phone" aria-label="小红书笔记预览">
      <header class="topbar">
        <button class="icon-button" type="button" aria-label="返回">
          <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="account" id="accountName"></div>
        <button class="icon-button" type="button" aria-label="更多">
          <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 13a1 1 0 1 0 0-2 1 1 0 0 0 0 2Zm6 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2ZM6 13a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" fill="currentColor"/></svg>
        </button>
      </header>

      <section class="carousel" aria-label="图文轮播">
        <div class="slides" id="slides"></div>
        <div class="pager" id="pager"></div>
      </section>

      <section class="content">
        <h1 id="title"></h1>
        <p class="body-copy" id="bodyCopy"></p>
        <div class="tags" id="tags"></div>
      </section>

      <section class="actions" aria-label="操作">
        <button class="action" type="button" aria-label="点赞">
          <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          赞
        </button>
        <button class="action" type="button" aria-label="收藏">
          <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3 2.7 5.5 6 .9-4.4 4.2 1 6-5.3-2.8-5.3 2.8 1-6-4.4-4.2 6-.9L12 3Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          收藏
        </button>
        <button class="action copy" id="copyButton" type="button" aria-label="复制文案">
          <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 8h10v12H8zM6 16H4V4h12v2" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          复制
        </button>
      </section>
      <p class="toast" id="toast" role="status" aria-live="polite"></p>
    </article>
  </main>

  <script>
    // XHS_PREVIEW_DATA_START
    window.XHS_PREVIEW_DATA = window.XHS_PREVIEW_DATA || {
      accountName: "账号名称",
      title: "这里是推荐标题",
      body: "这里是正文内容。\\n\\n替换为第二个节点生成的小红书正文。",
      tags: ["#核心关键词", "#关联关键词"],
      commentGuide: "欢迎在评论区交流。",
      images: [
        { src: "mock-images/01-cover.svg", alt: "封面页" },
        { src: "mock-images/02-point.svg", alt: "内容页" },
        { src: "mock-images/03-summary.svg", alt: "总结页" }
      ]
    };
    // XHS_PREVIEW_DATA_END

    const data = window.XHS_PREVIEW_DATA;
    const slides = document.getElementById("slides");
    const pager = document.getElementById("pager");
    const toast = document.getElementById("toast");

    function normalizeLineBreaks(value) {
      return String(value ?? "").replace(/\\n/g, "\n");
    }

    document.getElementById("accountName").textContent = data.accountName;
    document.getElementById("title").textContent = normalizeLineBreaks(data.title);
    document.getElementById("bodyCopy").textContent = normalizeLineBreaks(data.body);
    document.getElementById("tags").replaceChildren(
      ...data.tags.map((tag) => {
        const node = document.createElement("span");
        node.className = "tag";
        node.textContent = tag;
        return node;
      })
    );

    slides.replaceChildren(
      ...data.images.map((image) => {
        const item = document.createElement("div");
        item.className = "slide";
        const img = document.createElement("img");
        img.src = image.src;
        img.alt = image.alt || "";
        item.appendChild(img);
        return item;
      })
    );

    function currentSlideIndex() {
      const width = slides.clientWidth || 1;
      return Math.min(data.images.length, Math.max(1, Math.round(slides.scrollLeft / width) + 1));
    }

    function refreshPager() {
      pager.textContent = `${currentSlideIndex()}/${data.images.length}`;
    }

    function publishText() {
      return [
        normalizeLineBreaks(data.title),
        "",
        normalizeLineBreaks(data.body),
        "",
        data.tags.join(" "),
        "",
        normalizeLineBreaks(data.commentGuide)
      ].filter(Boolean).join("\n");
    }

    async function copyText(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }

        const input = document.createElement("textarea");
        input.value = text;
        input.setAttribute("readonly", "");
        input.style.position = "fixed";
        input.style.opacity = "0";
        document.body.appendChild(input);
        input.select();
        const copied = document.execCommand("copy");
        input.remove();
        if (!copied) {
          console.warn("[xhs-preview] copy fallback failed: document.execCommand returned false.");
        }
        return copied;
      } catch (error) {
        console.warn("[xhs-preview] copy failed.", error);
        return false;
      }
    }

    document.getElementById("copyButton").addEventListener("click", async () => {
      const copied = await copyText(publishText());
      toast.textContent = copied ? "已复制发布文案" : "复制失败，请手动选择文案";
    });

    slides.addEventListener("scroll", refreshPager, { passive: true });
    refreshPager();
  </script>
</body>
</html>
